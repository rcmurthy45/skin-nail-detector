<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkinAI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0f1117;
      --panel:      #1a1d27;
      --border:     #2a2d3e;
      --accent:     #7c6af7;
      --accent2:    #4fc3f7;
      --text:       #e8eaf0;
      --muted:      #7a7f9a;
      --success:    #4caf80;
      --error:      #ef5350;
      --radius:     16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Animated background ──────────────────────────────────────────── */
    .bg-blobs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width:500px; height:500px; background:#7c6af7; top:-100px; left:-100px; }
    .blob-2 { width:400px; height:400px; background:#4fc3f7; bottom:-100px; right:-100px; animation-delay:-6s; }
    .blob-3 { width:300px; height:300px; background:#f06292; top:40%; left:40%; animation-delay:-3s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.08); } }

    /* ── Card ─────────────────────────────────────────────────────────── */
    .card {
      position: relative; z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 22px; color: var(--text);
    }
    .logo-text span { color: var(--accent); }

    h1 { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    /* ── Form ─────────────────────────────────────────────────────────── */
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text); font-size: 15px; font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }

    .btn-primary {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), #9b8df9);
      border: none; border-radius: var(--radius);
      color: #fff; font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .switch-text {
      text-align: center; margin-top: 24px;
      font-size: 14px; color: var(--muted);
    }
    .switch-text a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .switch-text a:hover { text-decoration: underline; }

    /* ── Alert ────────────────────────────────────────────────────────── */
    .alert {
      padding: 12px 16px; border-radius: 10px;
      font-size: 14px; margin-bottom: 20px;
      display: none; align-items: center; gap: 8px;
    }
    .alert.error   { background: rgba(239,83,80,0.15); border: 1px solid rgba(239,83,80,0.3); color: #ef5350; }
    .alert.success { background: rgba(76,175,128,0.15); border: 1px solid rgba(76,175,128,0.3); color: #4caf80; }
    .alert.show { display: flex; }

    /* ── Loading spinner ──────────────────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div class="logo-text">Skin<span>AI</span></div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue</p>

    <div class="alert error" id="alertBox"></div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      <span id="btnText">Sign In</span>
      <div class="spinner" id="btnSpinner"></div>
    </button>

    <p class="switch-text">
      Don't have an account? <a href="/signup">Sign up</a>
    </p>
  </div>

  <script>
    // Allow pressing Enter to submit
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const alert    = document.getElementById("alertBox");
      const btn      = document.getElementById("loginBtn");
      const text     = document.getElementById("btnText");
      const spinner  = document.getElementById("btnSpinner");

      // Basic validation
      if (!username || !password) {
        showAlert("Please enter both username and password.", "error");
        return;
      }

      // Show loading state
      btn.disabled      = true;
      text.textContent  = "Signing in…";
      spinner.style.display = "inline-block";
      alert.className   = "alert";

      try {
        const res  = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          showAlert("Login successful! Redirecting…", "success");
          setTimeout(() => window.location.href = "/home", 800);
        } else {
          showAlert(data.message || "Invalid credentials.", "error");
          resetBtn();
        }
      } catch (err) {
        showAlert("Network error. Please try again.", "error");
        resetBtn();
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById("alertBox");
      el.textContent = msg;
      el.className = `alert ${type} show`;
    }

    function resetBtn() {
      document.getElementById("loginBtn").disabled = false;
      document.getElementById("btnText").textContent = "Sign In";
      document.getElementById("btnSpinner").style.display = "none";
    }
  </script>
</body>
</html>
