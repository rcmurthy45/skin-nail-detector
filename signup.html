<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkinAI — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --panel: #1a1d27; --border: #2a2d3e;
      --accent: #7c6af7; --accent2: #4fc3f7;
      --text: #e8eaf0; --muted: #7a7f9a;
      --success: #4caf80; --error: #ef5350; --radius: 16px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .bg-blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 12s ease-in-out infinite alternate; }
    .blob-1 { width:500px; height:500px; background:#4fc3f7; top:-100px; right:-100px; }
    .blob-2 { width:400px; height:400px; background:#7c6af7; bottom:-100px; left:-100px; animation-delay:-6s; }
    @keyframes drift { from { transform:translate(0,0) scale(1); } to { transform:translate(30px,20px) scale(1.08); } }
    .card { position:relative; z-index:1; background:var(--panel); border:1px solid var(--border); border-radius:24px; padding:48px 44px; width:100%; max-width:440px; box-shadow:0 32px 80px rgba(0,0,0,0.5); animation:fadeUp 0.6s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    .logo-icon { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:22px; }
    .logo-text { font-family:'DM Serif Display',serif; font-size:22px; }
    .logo-text span { color:var(--accent); }
    h1 { font-family:'DM Serif Display',serif; font-size:28px; margin-bottom:6px; }
    .subtitle { color:var(--muted); font-size:14px; margin-bottom:32px; }
    .field { margin-bottom:18px; }
    label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:8px; letter-spacing:0.5px; text-transform:uppercase; }
    input { width:100%; padding:14px 16px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:15px; font-family:inherit; transition:border-color 0.2s,box-shadow 0.2s; outline:none; }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,106,247,0.15); }
    .password-strength { height:4px; border-radius:2px; margin-top:8px; background:var(--border); overflow:hidden; }
    .strength-bar { height:100%; width:0; border-radius:2px; transition:width 0.3s, background 0.3s; }
    .btn-primary { width:100%; padding:15px; background:linear-gradient(135deg,var(--accent),#9b8df9); border:none; border-radius:var(--radius); color:#fff; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; margin-top:8px; transition:opacity 0.2s,transform 0.15s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .switch-text { text-align:center; margin-top:24px; font-size:14px; color:var(--muted); }
    .switch-text a { color:var(--accent); text-decoration:none; font-weight:500; }
    .alert { padding:12px 16px; border-radius:10px; font-size:14px; margin-bottom:20px; display:none; align-items:center; gap:8px; }
    .alert.error   { background:rgba(239,83,80,0.15); border:1px solid rgba(239,83,80,0.3); color:#ef5350; }
    .alert.success { background:rgba(76,175,128,0.15); border:1px solid rgba(76,175,128,0.3); color:#4caf80; }
    .alert.show { display:flex; }
    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div class="logo-text">Skin<span>AI</span></div>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Join SkinAI and start detecting</p>

    <div class="alert error" id="alertBox"></div>

    <div class="field">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" placeholder="Enter your full name" autocomplete="name">
    </div>
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Minimum 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="password-strength"><div class="strength-bar" id="strengthBar"></div></div>
    </div>

    <button class="btn-primary" id="signupBtn" onclick="doSignup()">
      <span id="btnText">Create Account</span>
      <div class="spinner" id="btnSpinner"></div>
    </button>

    <p class="switch-text">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <script>
    document.addEventListener("keydown", e => { if (e.key === "Enter") doSignup(); });

    function checkStrength(pwd) {
      const bar = document.getElementById("strengthBar");
      let score = 0;
      if (pwd.length >= 6)  score++;
      if (pwd.length >= 10) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const colors = ["#ef5350","#ff7043","#ffa726","#66bb6a","#4caf80"];
      const widths = ["20%","40%","60%","80%","100%"];
      bar.style.width     = score > 0 ? widths[score-1] : "0";
      bar.style.background= score > 0 ? colors[score-1] : "transparent";
    }

    async function doSignup() {
      const name     = document.getElementById("fullName").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const btn      = document.getElementById("signupBtn");
      const text     = document.getElementById("btnText");
      const spinner  = document.getElementById("btnSpinner");

      if (!name || !username || !password) {
        showAlert("All fields are required.", "error"); return;
      }
      if (password.length < 6) {
        showAlert("Password must be at least 6 characters.", "error"); return;
      }

      btn.disabled = true;
      text.textContent = "Creating…";
      spinner.style.display = "inline-block";

      try {
        const res  = await fetch("/signup", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ name, username, password })
        });
        const data = await res.json();

        if (data.success) {
          showAlert("Account created! Redirecting…", "success");
          setTimeout(() => window.location.href = "/home", 900);
        } else {
          showAlert(data.message || "Signup failed.", "error");
          btn.disabled = false;
          text.textContent = "Create Account";
          spinner.style.display = "none";
        }
      } catch (err) {
        showAlert("Network error. Please try again.", "error");
        btn.disabled = false;
        text.textContent = "Create Account";
        spinner.style.display = "none";
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById("alertBox");
      el.textContent = msg;
      el.className = `alert ${type} show`;
    }
  </script>
</body>
</html>
